<!DOCTYPE html>
<html>
<head>
    <title>Link Tag Demonstration</title>

    <!-- 1. Linking External CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- 2. Adding Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- 3. Linking Google Font -->

</head>

<body>

    <h1>Demonstration of Link Tag</h1>
    <p>This page uses external CSS and Google Fonts.</p>
    <button>Click Me</button>

</body>
</html>
