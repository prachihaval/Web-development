<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Registration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="date"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Employee Registration</h2>
    <form action="/submit_registration" method="POST">
        <div class="form-group">
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="firstname" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Gender:</label>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
        </div>
        <div class="form-group">
            <label for="dept">Department:</label>
            <select id="dept" name="department">
                <option value="hr">HR</option>
                <option value="it">IT</option>
            </select>
        </div>
        <div class="form-group">
            <label for="photo">Photo:</label>
            <input type="file" id="photo" name="profile_pic">
        </div>
        <input type="submit" value="Register">
    </form>
</div>

</body>
</html>
